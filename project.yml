name: Shio
options:
  bundleIdPrefix: sh.shio
  deploymentTarget:
    iOS: "26.0"
    macOS: "26.0"
  developmentLanguage: en
  groupSortPosition: top
  generateEmptyDirectories: true
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_UPCOMING_FEATURE_EXISTENTIAL_ANY: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    DEVELOPMENT_TEAM: ""
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
    SUPPORTS_MACCATALYST: NO

packages:
  swift-nio-ssh:
    url: https://github.com/apple/swift-nio-ssh
    from: 0.10.0
  swift-nio:
    url: https://github.com/apple/swift-nio
    from: 2.65.0

targets:
  Shio:
    type: application
    platform: iOS
    sources:
      - path: Shio
        excludes:
          - "**/.DS_Store"
          - "Resources/terminal"
      - path: Shio/Resources/terminal
        type: folder
        buildPhase: resources
      - path: Shio/Resources/fonts/DepartureMono-Regular.otf
        buildPhase: resources
      - path: Shio/Resources/fonts/DotGothic16-Regular.ttf
        buildPhase: resources
      # Alternate app icons must land in the bundle root (not a subfolder),
      # so list each file individually rather than as a folder reference.
      - path: Shio/Resources/AlternateIcons/AppIconLight60x60@2x.png
        buildPhase: resources
      - path: Shio/Resources/AlternateIcons/AppIconLight60x60@3x.png
        buildPhase: resources
      - path: Shio/Resources/AlternateIcons/AppIconDark60x60@2x.png
        buildPhase: resources
      - path: Shio/Resources/AlternateIcons/AppIconDark60x60@3x.png
        buildPhase: resources
    dependencies:
      - package: swift-nio-ssh
        product: NIOSSH
      - package: swift-nio
        product: NIOCore
      - package: swift-nio
        product: NIOPosix
      - framework: Frameworks/GhosttyKit.xcframework
        embed: true
      - target: ShioWidgets
      - target: ShioLiveActivities
    info:
      path: Shio/Info.plist
      properties:
        CFBundleDisplayName: Shio
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen:
          UIColorName: LaunchBackground
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
          UISceneConfigurations: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        LSApplicationCategoryType: public.app-category.developer-tools
        LSApplicationQueriesSchemes:
          - tailscale
        # `shio://connect?host=<id>` URL scheme — used by ShioWidgets to
        # request connection to a specific host.
        CFBundleURLTypes:
          - CFBundleURLName: sh.shio.app
            CFBundleURLSchemes:
              - shio
        # Handoff: advertised user activity types this app publishes and
        # accepts on continuation. Must match `SessionHandoff.activityType`.
        NSUserActivityTypes:
          - sh.shio.app.session
        NSSupportsLiveActivities: true
        NSSupportsLiveActivitiesFrequentUpdates: true
        NSFaceIDUsageDescription: Shio locks itself with Face ID so that picking up your phone doesn't expose your Macs.
        NSCameraUsageDescription: Shio uses the camera to scan the pairing QR code your machine shows, so it can connect securely.
        # Remote notifications: away-watcher pushes ("a session needs you")
        # and Live Activity remote updates.
        UIBackgroundModes:
          - remote-notification
        ITSAppUsesNonExemptEncryption: false
        # Alternate app icons. The primary AppIcon lives in
        # Assets.xcassets/AppIcon.appiconset (the dark keycap). Light keycap
        # — and an explicit dark entry so the user can "switch back" — are
        # registered here as alternates.
        CFBundleIcons:
          CFBundlePrimaryIcon:
            CFBundleIconName: AppIcon
          CFBundleAlternateIcons:
            AppIconLight:
              CFBundleIconFiles:
                - AppIconLight60x60
              UIPrerenderedIcon: false
            AppIconDark:
              CFBundleIconFiles:
                - AppIconDark60x60
              UIPrerenderedIcon: false
        CFBundleIcons~ipad:
          CFBundlePrimaryIcon:
            CFBundleIconName: AppIcon
          CFBundleAlternateIcons:
            AppIconLight:
              CFBundleIconFiles:
                - AppIconLight60x60
              UIPrerenderedIcon: false
            AppIconDark:
              CFBundleIconFiles:
                - AppIconDark60x60
              UIPrerenderedIcon: false
        UIAppFonts:
          - DepartureMono-Regular.otf
          - DotGothic16-Regular.ttf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: sh.shio.app
        CODE_SIGN_ENTITLEMENTS: Shio/Shio.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

  ShioWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: ShioWidgets
      # Shared App Group state — built into both the main app and this
      # widget extension so they speak the same WidgetHost type.
      - path: Shio/Core/Widgets/WidgetSharedState.swift
    info:
      path: ShioWidgets/Info.plist
      properties:
        CFBundleDisplayName: Shio Widgets
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: sh.shio.app.widgets
        CODE_SIGN_ENTITLEMENTS: ShioWidgets/ShioWidgets.entitlements

  ShioLiveActivities:
    type: app-extension
    platform: iOS
    sources:
      - path: ShioLiveActivities
      # Shared Activity attributes — built into both the main app and
      # this widget extension so they speak the same ActivityKit type.
      - path: Shio/Core/LiveActivities/SessionActivityAttributes.swift
    info:
      path: ShioLiveActivities/Info.plist
      properties:
        CFBundleDisplayName: Shio Live Activities
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: sh.shio.app.liveactivities
        CODE_SIGN_ENTITLEMENTS: ShioLiveActivities/ShioLiveActivities.entitlements

  # Shio for Mac — native macOS terminal (NOT Catalyst). Shares the
  # platform-agnostic core with the iOS app by adding those sources here
  # explicitly as the Mac UI/terminal layer is built out (M2+). For now
  # (M1) it's a standalone empty window so the target builds green.
  ShioMac:
    type: application
    platform: macOS
    sources:
      - path: ShioMac
        excludes:
          - "**/.DS_Store"
      # Shared platform-agnostic core, added file-by-file as the Mac UI is
      # built (keeps the macOS target green vs. importing iOS-only files).
      - path: Shio/Features/Terminal/LibGhostty/LibGhosttyBridge.swift
    dependencies:
      # libghostty's macOS slice uses Carbon's Text Input Source (TIS) APIs
      # for keyboard-layout handling; link it explicitly.
      - sdk: Carbon.framework
      - sdk: Metal.framework
      - sdk: QuartzCore.framework
      - package: swift-nio-ssh
        product: NIOSSH
      - package: swift-nio
        product: NIOCore
      - package: swift-nio
        product: NIOPosix
      - framework: Frameworks/GhosttyKit.xcframework
        embed: true
    info:
      path: ShioMac/Info.plist
      properties:
        CFBundleDisplayName: Shio
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSApplicationCategoryType: public.app-category.developer-tools
        LSMinimumSystemVersion: "26.0"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: sh.shio.app.mac
        MACOSX_DEPLOYMENT_TARGET: "26.0"

schemes:
  Shio:
    build:
      targets:
        Shio: all
        ShioWidgets: all
        ShioLiveActivities: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
  ShioMac:
    build:
      targets:
        ShioMac: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
